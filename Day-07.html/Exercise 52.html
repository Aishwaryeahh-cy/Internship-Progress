<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATM Transaction</title>
</head>
<body>
    <script>
        let balance = 5000;
        let atm = new Promise(function(resolve,reject){
            if (balance >= 5000){
                resolve("Withdrawal Successful");
            }
            else{
                reject("Insufficient Balance");
            }
        });
        atm.then(function(result){
            document.write(result);
        });
        atm.catch(function(error){
            document.write(error);
        });

    </script>
    
</body>
</html>
