<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Availability</title>
</head>
<body>
    <script>
        let ticket =new Promise(function(resolve,reject){
            let available = true;
            if (available){
                resolve ("Ticket Booked Successfully");
            }else{
                reject ("Tickets are Unavailable");
            }
        });
        ticket
        .then(function(result){
           document.write(result);
        })
        .catch(function(error){
            document.write(error);
        });
    </script>
</body>
</html>
