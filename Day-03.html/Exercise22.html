<!DOCTYPE html>
<html lang="en">
<head>
    <title>Arrow Function Calculator</title>
</head>
<body>

<script>

const calculate = (a, b, op) => {

    if (op == "+") {
        return a + b;
    }
    else if (op == "-") {
        return a - b;
    }
    else if (op == "*") {
        return a * b;
    }
    else if (op == "/") {
        return a / b;
    }
    else {
        return "Invalid Operator";
    }

};

console.log(calculate(8, 4, "/"));

</script>

</body>
</html>
