<!DOCTYPE html>
<html lang="en">
<head>
    <title>slice() and splice()</title>
</head>
<body>

<script>

let colors = ["Red", "Blue", "Green", "Yellow", "Pink"];
let newColors = colors.slice(1, 3);
colors.splice(2, 2);
console.log("New Array:", newColors);
console.log("Original Array after splice:", colors);

</script>

</body>
</html>
