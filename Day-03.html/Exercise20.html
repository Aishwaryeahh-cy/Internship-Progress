<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Maximum</title>
</head>
<body>
    <script>
        function findMax(a,b){
            if (a>b){
                return a;
            }
            else{
                return b;
            }
        }
        let result = findMax(12,9);
        console.log("Max Num:",result);

    </script>
</body>
</html>
