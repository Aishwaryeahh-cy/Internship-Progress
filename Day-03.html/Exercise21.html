<!DOCTYPE html>
<html lang="en">
<head>
    <title>Count Vowels</title>
</head>
<body>

<script>

function countVowels(str) {

    let count = 0;

    for (let i = 0; i < str.length; i++) {

        if ("aeiouAEIOU".includes(str[i])) {
            count++;
        }

    }

    return count;
}

console.log(countVowels("JavaScript"));

</script>

</body>
</html>
