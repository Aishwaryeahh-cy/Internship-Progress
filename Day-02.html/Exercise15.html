<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Marks Analysis</title>
</head>
<body>

<script>

let marks = [78, 45, 89, 32, 91, 67, 55];

let pass = 0;
let fail = 0;
let highest = marks[0];
let sum = 0;

for (let i = 0; i < marks.length; i++) {

    if (marks[i] >= 50) {
        pass++;
    }
    else {
        fail++;
    }

    if (marks[i] > highest) {
        highest = marks[i];
    }

    sum = sum + marks[i];
}

let average = sum / marks.length;

console.log("Passed Students:", pass);
console.log("Failed Students:", fail);
console.log("Highest Mark:", highest);
console.log("Average Marks:", average);

</script>

</body>
</html>
