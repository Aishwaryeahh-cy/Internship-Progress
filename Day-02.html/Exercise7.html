<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Age Category</title>
</head>
<body>
    <script>
        let age = 20;
        if (age<13){
            console.log("Child");
        }
        else if (age >=13 && age <= 19){
            console.log("Teenager");
        }
        else if (age >=20 && age <=59){
            console.log("Adult")
        }
        else if (age >= 60){
            console.log("Senior Citizen")
        }
    </script>
</body>
</html>
