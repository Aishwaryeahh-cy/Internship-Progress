<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=var, initial-scale=1.0">
    <title>Number Type Conversion</title>
</head>
<body>
    <script>
        let num = "250";
        let number = Number(num);
        let result = number + 50;
        console.log("Value:",num);
        console.log("Result:",result);
    </script>
</body>
</html>
