<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do Priority Manager</title>

<style>

.high{
    color:red;
}

.completed{
    color:green;
    text-decoration:line-through;
}

</style>

</head>
<body>

<h2>To-Do List</h2>

<ul>

    <li class="high">Complete Project</li>

    <li class="completed">Pay Electricity Bill</li>

    <li>Read JavaScript Notes</li>

    <li class="high">Prepare Interview</li>

    <li class="completed">Morning Exercise</li>

</ul>

<button onclick="updateTasks()">Update Tasks</button>

<h3 id="pending">Pending Tasks: 0</h3>

<script>

function updateTasks(){

    let highTasks = document.querySelectorAll(".high");
    let completedTasks = document.querySelectorAll(".completed");
    let allTasks = document.querySelectorAll("li");

    for(let i = 0; i < highTasks.length; i++){

        highTasks[i].style.color = "red";

    }

    for(let i = 0; i < completedTasks.length; i++){

        completedTasks[i].style.color = "green";
        completedTasks[i].style.textDecoration = "line-through";

    }

    let pending = allTasks.length - completedTasks.length;

    document.getElementById("pending").innerHTML =
    "Pending Tasks: " + pending;

}

</script>

</body>
</html>
