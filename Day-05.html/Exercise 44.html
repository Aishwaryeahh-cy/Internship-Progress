<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Availability Status</title>

    <style>
        .card{
            width:300px;
            margin:auto;
            text-align:center;
            border:2px solid black;
            padding:20px;
            border-radius:10px;
            background-color:lightgreen;
        }

        button{
            padding:10px;
            margin-top:15px;
        }
    </style>
</head>
<body>

<div class="card">

    <h2>Laptop</h2>

    <h3>Available</h3>

    <button>Toggle Availability</button>

</div>

<script>

let card = document.querySelector(".card");
let status = document.querySelector("h3");
let button = document.querySelector("button");

button.onclick = function(){

    if(status.innerHTML == "Available"){

        status.innerHTML = "Out of Stock";
        status.style.color = "red";
        card.style.backgroundColor = "lightcoral";

    }
    else{

        status.innerHTML = "Available";
        status.style.color = "green";
        card.style.backgroundColor = "lightgreen";

    }

}

</script>

</body>
</html>
