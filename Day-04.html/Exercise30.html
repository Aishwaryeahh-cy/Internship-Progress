<!DOCTYPE html>
<html lang="en">
<head>
    <title>Employee Salary Analysis</title>
</head>
<body>

<script>

let employees = [
    { id: 1, name: "John", salary: 50000, department: "IT" },
    { id: 2, name: "Emma", salary: 70000, department: "HR" },
    { id: 3, name: "David", salary: 60000, department: "IT" },
    { id: 4, name: "Sophia", salary: 80000, department: "Finance" }
];
document.write("<h3>IT Employees</h3>");

for (let i = 0; i < employees.length; i++) {

    if (employees[i].department == "IT") {
        document.write(employees[i].name + "<br>");
    }

}

let totalSalary = 0;

for (let i = 0; i < employees.length; i++) {
    totalSalary = totalSalary + employees[i].salary;
}

document.write("<br>Total Salary: " + totalSalary + "<br><br>");

let highest = employees[0];

for (let i = 1; i < employees.length; i++) {

    if (employees[i].salary > highest.salary) {
        highest = employees[i];
    }

}

document.write("Highest Salary Employee: " + highest.name + "<br>");
document.write("Highest Salary: " + highest.salary + "<br><br>");

let names = [];

for (let i = 0; i < employees.length; i++) {
    names.push(employees[i].name);
}

document.write("Employee Names: " + names);

</script>

</body>
</html>
