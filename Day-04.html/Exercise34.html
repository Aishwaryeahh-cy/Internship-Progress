<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart System</title>
</head>
<body>

<script>

const cart = [
    { name: "Phone", price: 20000, quantity: 1 },
    { name: "Headphones", price: 2000, quantity: 2 },
    { name: "Charger", price: 1000, quantity: 3 }
];

let total = 0;

for(let i = 0; i < cart.length; i++){

    total = total + (cart[i].price * cart[i].quantity);

}

document.write("<h2>Total Cart Value</h2>");
document.write("Total = " + total + "<br><br>");

for(let i = 0; i < cart.length; i++){

    if(cart[i].name == "Charger"){
        cart.splice(i,1);
    }

}

document.write("<h2>After Removing Charger</h2>");

for(let i = 0; i < cart.length; i++){

    document.write(cart[i].name + "<br>");

}

cart.push({
    name:"Power Bank",
    price:1500,
    quantity:2
});

document.write("<h2>After Adding New Item</h2>");

for(let i = 0; i < cart.length; i++){

    document.write(cart[i].name + "<br>");

}

let productNames = cart.map(item => item.name);

document.write("<h2>Product Names</h2>");
document.write(productNames);

</script>

</body>
</html>
