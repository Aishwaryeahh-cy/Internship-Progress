<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce Dashboard</title>
</head>
<body>

<script>

const orders = [
{
    id: 1,
    customer: "John",
    products: [
        { name: "Laptop", price: 50000 },
        { name: "Mouse", price: 500 }
    ]
},
{
    id: 2,
    customer: "Emma",
    products: [
        { name: "Phone", price: 30000 },
        { name: "Headphones", price: 2000 }
    ]
}
];

document.write("<h2>Total Amount Spent</h2>");

let highestAmount = 0;
let highestCustomer = "";

for(let i = 0; i < orders.length; i++){

    let total = 0;

    for(let j = 0; j < orders[i].products.length; j++){

        total += orders[i].products[j].price;

    }

    document.write(orders[i].customer + " : ₹" + total + "<br>");

    if(total > highestAmount){
        highestAmount = total;
        highestCustomer = orders[i].customer;
    }

}

document.write("<h2>Highest Spender</h2>");
document.write(highestCustomer + " : ₹" + highestAmount + "<br><br>");

let productNames = [];

for(let i = 0; i < orders.length; i++){

    for(let j = 0; j < orders[i].products.length; j++){

        productNames.push(orders[i].products[j].name);

    }

}

document.write("<h2>All Product Names</h2>");
document.write(productNames + "<br><br>");


// 4. Count total products sold
let count = 0;

for(let i = 0; i < orders.length; i++){

    count += orders[i].products.length;

}

document.write("<h2>Total Products Sold</h2>");
document.write(count + "<br><br>");


// 5. Products costing more than ₹10,000
document.write("<h2>Products Costing More Than ₹10,000</h2>");

for(let i = 0; i < orders.length; i++){

    for(let j = 0; j < orders[i].products.length; j++){

        if(orders[i].products[j].price > 10000){

            document.write(
                orders[i].products[j].name +
                " - ₹" +
                orders[i].products[j].price +
                "<br>"
            );

        }

    }

}

</script>

</body>
</html>
