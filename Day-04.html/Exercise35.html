<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Object Properties</title>
</head>
<body>

<script>

const user = {
    name: "Rahul",
    age: 25
};

user["email"] = "rahul@gmail.com";

delete user.age;

document.write("<h2>Keys</h2>");
document.write(Object.keys(user) + "<br><br>");

document.write("<h2>Values</h2>");
document.write(Object.values(user) + "<br><br>");

document.write("<h2>Email Exists?</h2>");

if(user.hasOwnProperty("email")){
    document.write("Yes");
}
else{
    document.write("No");
}

</script>

</body>
</html>
