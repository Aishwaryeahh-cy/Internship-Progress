<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Management System</title>
</head>
<body>

<script>

const library = {
    books: [
        { title: "JavaScript", available: true },
        { title: "Python", available: false },
        { title: "Java", available: true }
    ]
};

document.write("<h2>Available Books</h2>");

for(let i = 0; i < library.books.length; i++){

    if(library.books[i].available == true){
        document.write(library.books[i].title + "<br>");
    }

}

library.books.push({
    title: "C++",
    available: true
});

document.write("<h2>After Adding New Book</h2>");

for(let i = 0; i < library.books.length; i++){
    document.write(library.books[i].title + "<br>");
}

for(let i = 0; i < library.books.length; i++){

    if(library.books[i].title == "Python"){
        library.books[i].available = true;
    }

}

document.write("<h2>After Updating Python</h2>");

for(let i = 0; i < library.books.length; i++){

    document.write(
        library.books[i].title +
        " - " +
        library.books[i].available +
        "<br>"
    );

}

let bookTitles = library.books.map(book => book.title);

document.write("<h2>Book Titles</h2>");
document.write(bookTitles);

</script>

</body>
</html>
