<!DOCTYPE html>
<html>
    <head>
        <title>Even Or Odd</title>
    </head>
    <body>
        <h3>Even or Odd</h3>
        <script>
            let num = 17;
            let num1 = 24;
            if (num % 2 == 0){
                console.log("Even Num:",num);
            }
            else{
                console.log("Odd Num:",num);
            }
            if (num1 % 2 == 0){
                console.log("Even Num:",num1);
            }
            else{
                console.log("Odd Num:",num1);
            }
        </script>
    </body>
</html>
