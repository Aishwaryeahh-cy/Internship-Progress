<!DOCTYPE html>
<html>
    <head>
        <title> Find the Largest Number </title>
    </head>
    <body>
        <h2>Find the Largest Number</h2>
        <script>
            function findLargest(num1,num2) {
                if (num1 > num2){
                    return num1;
                }
                else{
                    return num2;
                }
            }
                let largest = findLargest(35,50);
                console.log("Largest Number:", largest);
        </script>   
    </body>
</html>
