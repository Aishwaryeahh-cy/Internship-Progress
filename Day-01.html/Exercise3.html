        <title>Multiplication Table</title>

        <body>
            <h3>Multiplicative Table </h3>
            <script>
                let n = 7;
                for (let i =1; i<= 10; i++){
                    console.log(n + "x" + i + "=" + (n * i));
                }

            </script>
